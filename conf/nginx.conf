worker_processes  1;

events {
    # Maximum number of simultaneous worker connections
    worker_connections  1024;
}

http {
    # Include MIME type mappings
    include       mime.types;
    default_type  application/octet-stream;

    # Define a connection limit zone based on a request header (API key)
    # This creates a shared memory zone named "my_limit" (10MB)
    limit_conn_by_header_zone $http_x_api_key zone=my_limit:10m;

    server {
        # Listen on HTTP port 80
        listen       80;

        # Server name (localhost for local development)
        server_name  localhost;

        location / {
            # Root directory for served files
            root   /home/ser/nginx/docs/html;

            # Default index files
            index  index.html index.htm;

            # Apply connection limit based on the defined zone
            # Allows up to 4 concurrent connections per API key
            limit_conn_by_header my_limit 4;

            # HTTP status code returned when limit is exceeded
            limit_conn_header_status_code 503;
        }
    }
}